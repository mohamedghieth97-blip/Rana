<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey! I have a question...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6ea;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .gif-container img {
            max-width: 150px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            height: 60px;
            position: relative;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        #yesBtn {
            background-color: #4cc9f0;
            color: white;
        }
        #noBtn {
            background-color: #ff4d6d;
            color: white;
            position: absolute;
        }
        /* Date Picker Styling */
        #dateForm {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease forwards;
        }
        input[type="datetime-local"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ff4d6d;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #333;
            outline: none;
        }
        #submitDate {
            background-color: #ff4d6d;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Background Music Player (Uses a cute copyright-free romantic track) -->
    <audio id="bgMusic" loop>
        <source src="https://soundhelix.com" type="audio/mpeg">
    </audio>

    <div class="container" id="questionBox">
        <div class="gif-container">
            <img id="displayGif" src="https://giphy.com" alt="Cute cat">
        </div>
        <h1 id="headline">Will you go on a date with me? ❤️</h1>
        
        <div class="buttons" id="btnGroup">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn" style="left: 210px;">No</button>
        </div>

        <!-- Date Picker Form -->
        <div id="dateForm">
            <p style="color: #666; font-size: 14px;">Pick a day and time that works for you:</p>
            <input type="datetime-local" id="datePicker">
            <br>
            <button id="submitDate">Lock it in! 🗓️</button>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const headline = document.getElementById('headline');
        const gif = document.getElementById('displayGif');
        const btnGroup = document.getElementById('btnGroup');
        const dateForm = document.getElementById('dateForm');
        const bgMusic = document.getElementById('bgMusic');
        const submitDate = document.getElementById('submitDate');
        
        let yesScale = 1;

        // Try playing music immediately when they interact with the page
        function startMusic() {
            bgMusic.play().catch(() => {
                // Browsers block autoplay until user click, this catches that safely
            });
        }

        noBtn.addEventListener('mouseover', () => { moveButton(); startMusic(); });
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); startMusic(); });

        function moveButton() {
            const padding = 100;
            const x = Math.random() * (window.innerWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - padding * 2) + padding;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            yesScale += 0.2;
            yesBtn.style.transform = `scale(${yesScale})`;
        }

        // Action when YES clicked
        yesBtn.addEventListener('click', () => {
            startMusic();
            headline.innerHTML = "Yay! I knew you'd say yes! 🥰";
            gif.src = "https://giphy.com";
            
            noBtn.style.display = 'none';
            btnGroup.style.display = 'none';
            dateForm.style.display = 'block'; // Show date picker

            // Continuous Confetti Shower
            var duration = 4 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        });

        // Date submit action
        submitDate.addEventListener('click', () => {
            const dateValue = document.getElementById('datePicker').value;
            if(!dateValue) {
                alert("Please pick a date first!");
                return;
            }
            const chosenDate = new Date(dateValue).toLocaleString();
            headline.innerHTML = `It's a date! Can't wait for <br><strong>${chosenDate}</strong>! 🥂`;
            dateForm.style.display = 'none';
            gif.src = "https://giphy.com";
        });
    </script>
</body>
</html>
