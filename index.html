<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hi Rana! ☃️❄️</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ice-bg: #dff4fb;
    --card-bg: #ffffffee;
    --cyan: #00bcd4;
    --cyan-dark: #0097a7;
    --cyan-light: #b2ebf2;
    --accent: #4dd0e1;
    --text: #1a3a4a;
    --shadow: 0 8px 40px rgba(0,188,212,0.18);
    --bubble-tip: 22px;
  }

  html, body {
    min-height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--ice-bg);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── Snowfall ─────────────────────────────────── */
  #snow-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Main layout ──────────────────────────────── */
  .scene {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px 48px;
  }

  .card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    box-shadow: var(--shadow), 0 0 0 1.5px rgba(0,188,212,0.15);
    padding: 36px 32px 40px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    animation: floatIn .7s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes floatIn {
    from { opacity:0; transform:translateY(32px) scale(.97); }
    to   { opacity:1; transform:none; }
  }

  /* ─── Olaf GIF ─────────────────────────────────── */
  .olaf-wrap {
    width: 160px; height: 160px;
    margin: 0 auto 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b2ebf2 0%, #e0f7fa 100%);
    box-shadow: 0 4px 24px rgba(0,188,212,.22);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .olaf-wrap img {
    width: 148px; height: 148px;
    object-fit: cover; border-radius: 50%;
  }

  /* ─── Speech bubble ────────────────────────────── */
  .bubble {
    position: relative;
    background: #fff;
    border: 2.5px solid var(--cyan-light);
    border-radius: 20px;
    padding: 20px 22px;
    margin: 20px 0 28px;
    font-size: 1.08rem;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
    box-shadow: 0 2px 16px rgba(0,188,212,.10);
    transition: all .35s ease;
  }
  .bubble::before {
    content: '';
    position: absolute;
    top: -var(--bubble-tip);
    left: 50%; transform: translateX(-50%);
    border: var(--bubble-tip) solid transparent;
    border-bottom-color: var(--cyan-light);
    border-top: 0;
    top: calc(-1 * var(--bubble-tip));
    filter: drop-shadow(0 -2px 0 var(--cyan-light));
  }
  .bubble::after {
    content: '';
    position: absolute;
    top: calc(-1 * var(--bubble-tip) + 3px);
    left: 50%; transform: translateX(-50%);
    border: calc(var(--bubble-tip) - 2px) solid transparent;
    border-bottom-color: #fff;
    border-top: 0;
  }

  /* ─── Buttons ──────────────────────────────────── */
  .btn-row {
    display: flex; flex-wrap: wrap;
    gap: 12px; justify-content: center;
    margin-top: 6px;
  }

  .btn {
    padding: 13px 28px;
    border: none; border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, background .2s;
    outline: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.96); }

  .btn-yes {
    background: linear-gradient(135deg, #00bcd4, #26c6da);
    color: #fff;
    box-shadow: 0 4px 18px rgba(0,188,212,.38);
    transition: transform .3s cubic-bezier(.22,1,.36,1), box-shadow .2s;
  }
  .btn-yes:hover { box-shadow: 0 6px 28px rgba(0,188,212,.5); }

  .btn-no {
    background: #f0f9fb;
    color: var(--cyan-dark);
    border: 2px solid var(--cyan-light);
    position: fixed;
    z-index: 9999;
  }
  .btn-no.in-row {
    position: relative;
    z-index: auto;
    left: auto !important;
    top: auto !important;
    right: auto !important;
    bottom: auto !important;
    transform: none !important;
  }
  .btn-no:hover { background: #e0f7fa; }

  .btn-choice {
    background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
    color: var(--cyan-dark);
    border: 2px solid var(--accent);
    font-size: .97rem;
    padding: 12px 22px;
  }
  .btn-choice:hover { background: linear-gradient(135deg, #b2ebf2, #80deea); }
  .btn-choice.selected {
    background: linear-gradient(135deg, #00bcd4, #26c6da);
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 16px rgba(0,188,212,.35);
  }

  .btn-confirm {
    background: linear-gradient(135deg, #00bcd4, #0097a7);
    color: #fff;
    box-shadow: 0 4px 18px rgba(0,150,180,.38);
    padding: 14px 36px; font-size: 1.05rem;
    margin-top: 12px;
  }
  .btn-confirm:hover { box-shadow: 0 6px 28px rgba(0,150,180,.5); }

  /* ─── Datetime input ───────────────────────────── */
  .dt-wrap {
    display: flex; flex-direction: column; gap: 12px; align-items: center;
    margin-top: 8px;
  }
  input[type="datetime-local"] {
    padding: 13px 18px;
    border: 2px solid var(--cyan-light);
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 600;
    color: var(--text);
    background: #f7fdfe;
    outline: none;
    width: 100%; max-width: 320px;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="datetime-local"]:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,188,212,.15);
  }

  /* ─── Final card ───────────────────────────────── */
  .final-text {
    font-size: 1.12rem;
    font-weight: 700;
    color: var(--cyan-dark);
    line-height: 1.7;
  }
  .confetti-emoji {
    font-size: 2.4rem;
    display: block;
    margin: 12px 0 4px;
    animation: pop .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes pop {
    from { transform: scale(0); opacity:0; }
    to   { transform: scale(1); opacity:1; }
  }

  /* ─── Step label ───────────────────────────────── */
  .step-label {
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  /* ─── Snowflake header ─────────────────────────── */
  .site-header {
    font-size: 1.9rem;
    font-weight: 900;
    color: var(--cyan-dark);
    letter-spacing: -.5px;
    margin-bottom: 4px;
  }

  /* ─── Music toggle ─────────────────────────────── */
  #music-toggle {
    position: fixed; top: 16px; right: 16px;
    z-index: 1000;
    background: #ffffffcc;
    border: 2px solid var(--cyan-light);
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 1.3rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,188,212,.18);
    backdrop-filter: blur(6px);
    transition: background .2s;
  }
  #music-toggle:hover { background: #e0f7fa; }

  /* ─── Responsive ───────────────────────────────── */
  @media (max-width: 480px) {
    .card { padding: 28px 18px 32px; }
    .olaf-wrap { width: 130px; height: 130px; }
    .olaf-wrap img { width: 120px; height: 120px; }
    .site-header { font-size: 1.5rem; }
    .bubble { font-size: 1rem; padding: 16px 16px; }
    .btn { padding: 12px 20px; font-size: .93rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0s !important; transition-duration: 0s !important; }
  }

  /* ─── Hidden utility ───────────────────────────── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Snow canvas -->
<canvas id="snow-canvas"></canvas>

<!-- Music toggle -->
<button id="music-toggle" title="Toggle music" aria-label="Toggle music">🎵</button>

<!-- Background audio — Vuelie / Frozen opening -->
<audio id="bg-music" loop preload="auto">
  <source src="Frozen.mp3" type="audio/mpeg" />
  Your browser does not support the audio element.
</audio>

<!-- The control button -->
<button id="music-btn" style="padding: 10px 20px; border-radius: 8px; cursor: pointer;">
  🎵 Play Music
</button>

<!-- ═══ Main scene ════════════════════════════════════════ -->
<div class="scene">
  <div class="card" id="main-card">

    <div class="step-label" id="step-label">Step 1 of 4</div>
    <div class="site-header">❄️ Olaf(Me😛) is wondering ☃️</div>

    <!-- Olaf GIF -->
    <div class="olaf-wrap">
      <img id="olaf-img"
        src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExY3NibDA3M2lxdmNwaDBlMGgxbXA0dXhycWJxZzhmN3VyM3N6YnV5MSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/kWV0Mt9QO9ua4/giphy.gif"
        alt="Olaf waving"
        onerror="this.src='https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExaWZ0ejNmcXBtZWR3ZnE3amhyZWY0ZWJjdW5zNjZqbGZhMmlweDhmaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/FZiXDhzZJmHzq/giphy.gif'"
      />
    </div>

    <!-- Speech bubble -->
    <div class="bubble" id="bubble-text">
      Hi Ranoon! I'm Olaf and I love warm hugs…<br/>
      Will you go on a date with me? ☃️❄️
    </div>

    <!-- Step 1: Yes / No -->
    <div class="btn-row" id="step1-btns">
      <button class="btn btn-yes" id="yes-btn" onclick="handleYes()">Yes! 💖</button>
      <button class="btn btn-no"  id="no-btn"  >No 🙅</button>
    </div>

    <!-- Step 2: Activity -->
    <div class="btn-row hidden" id="step2-btns">
      <button class="btn btn-choice" onclick="pickActivity('Cinema Date 🎬')">Cinema Date 🎬</button>
      <button class="btn btn-choice" onclick="pickActivity('Playing Date 🕹️')">Playing Date 🕹️</button>
    </div>

    <!-- Step 3: Food -->
    <div class="btn-row hidden" id="step3-btns">
      <button class="btn btn-choice" onclick="pickFood('Burgers 🍔')">Burgers 🍔</button>
      <button class="btn btn-choice" onclick="pickFood('Pasta 🍝')">Pasta 🍝</button>
      <button class="btn btn-choice" onclick="pickFood('Pizza 🍕')">Pizza 🍕</button>
      <button class="btn btn-choice" onclick="pickFood('Fried Chicken 🍗')">Fried Chicken 🍗</button>
      <button class="btn btn-choice" onclick="pickFood('Sushi 🍣')">Sushi 🍣</button>
    </div>

    <!-- Step 4: Date/time -->
    <div class="dt-wrap hidden" id="step4-btns">
      <input type="datetime-local" id="dt-input" />
      <button class="btn btn-confirm" onclick="lockDate()">Lock it in! 🗓️</button>
    </div>

    <!-- Step 5: Final -->
    <div class="hidden" id="step5-content">
      <span class="confetti-emoji">🥂</span>
      <p class="final-text" id="final-text"></p>
    </div>

  </div>
</div>

<!-- Canvas Confetti CDN -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let activity = '', food = '', chosenDate = '';
let yesScale = 1;
let musicStarted = false;
let musicOn = true;

/* ══════════════════════════════════════════════
   SNOWFALL
══════════════════════════════════════════════ */
(function snowfall() {
  const canvas = document.getElementById('snow-canvas');
  const ctx = canvas.getContext('2d');
  let flakes = [];
  const NUM = 80;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < NUM; i++) {
    flakes.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 2 + Math.random() * 4,
      d: .4 + Math.random() * .8,
      o: .4 + Math.random() * .5,
      drift: (Math.random() - .5) * .4,
      t: Math.random() * Math.PI * 2
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    flakes.forEach(f => {
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.globalAlpha = f.o;
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    flakes.forEach(f => {
      f.t += .015;
      f.y += f.d;
      f.x += Math.sin(f.t) * .5 + f.drift;
      if (f.y > canvas.height + 10) { f.y = -10; f.x = Math.random() * canvas.width; }
      if (f.x > canvas.width + 10)  { f.x = -10; }
      if (f.x < -10)                { f.x = canvas.width + 10; }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════════════
   MUSIC
══════════════════════════════════════════════ */
const audio = document.getElementById('bg-music');
audio.volume = 0.45;

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  audio.play().catch(() => { musicStarted = false; });
}

// Start music on the very first user interaction (required by all browsers)
function onFirstInteraction() {
  startMusic();
  ['click','mousemove','mousedown','touchstart','keydown','scroll'].forEach(ev => {
    document.removeEventListener(ev, onFirstInteraction);
  });
}
['click','mousemove','mousedown','touchstart','keydown','scroll'].forEach(ev => {
  document.addEventListener(ev, onFirstInteraction, { passive: true });
});

document.getElementById('music-toggle').addEventListener('click', () => {
  musicOn = !musicOn;
  if (musicOn) {
    musicStarted = false;
    startMusic();
    document.getElementById('music-toggle').textContent = '🎵';
  } else {
    audio.pause();
    document.getElementById('music-toggle').textContent = '🔇';
  }
});

/* ══════════════════════════════════════════════
   NO BUTTON — RUNAWAY PRANK
══════════════════════════════════════════════ */
const noBtn  = document.getElementById('no-btn');
const yesBtn = document.getElementById('yes-btn');

function teleportNo(e) {
  if (e && e.cancelable) e.preventDefault();
  startMusic();

  // If it's the very first time moving, remove the 'in-row' layout class safely
  if (noBtn.classList.contains('in-row')) {
    noBtn.classList.remove('in-row');
  }

  // Get screen dimensions minus button size padding
  const padding = 100;
  const x = Math.random() * (window.innerWidth - padding * 2) + padding;
  const y = Math.random() * (window.innerHeight - padding * 2) + padding;
  
  // Reposition button absolute to the whole viewport
  noBtn.style.position = 'fixed';
  noBtn.style.left = `${x}px`;
  noBtn.style.top = `${y}px`;
  noBtn.style.right     = 'auto';
  noBtn.style.bottom    = 'auto';
  noBtn.style.transform = 'none';

  // Make the Yes button grow larger
  yesScale = Math.min(yesScale + 0.12, 2.6);
  yesBtn.style.transform = `scale(${yesScale})`;
}

// Start the No button nicely beside Yes
noBtn.classList.add('in-row');

// Clean event listeners: Only trigger the teleport once per interaction
noBtn.addEventListener('mouseover',  teleportNo);
noBtn.addEventListener('touchstart', teleportNo, { passive: false });

/* ══════════════════════════════════════════════
   STEP 1 → 2  (Yes clicked)
══════════════════════════════════════════════ */
function handleYes() {
  startMusic();

  // Confetti burst
  confetti({ particleCount: 160, spread: 90, origin: { y: 0.55 },
    colors: ['#00bcd4','#b2ebf2','#ffffff','#80deea','#e0f7fa','#ffccdd'] });
  setTimeout(() => confetti({ particleCount: 80, spread: 120, origin: { y: 0.4 },
    colors: ['#00bcd4','#fff','#f48fb1'] }), 400);

  // Switch GIF
  document.getElementById('olaf-img').src =
    'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExaWZ0ejNmcXBtZWR3ZnE3amhyZWY0ZWJjdW5zNjZqbGZhMmlweDhmaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/FZiXDhzZJmHzq/giphy.gif';

  // Update bubble
  document.getElementById('bubble-text').innerHTML =
    "Yay! Some people are worth melting for! 🥰<br/>What kind of date are we going on, Ranooon?";

  // Hide step1, show step2
  document.getElementById('step1-btns').classList.add('hidden');
  noBtn.style.display = 'none';
  document.getElementById('step2-btns').classList.remove('hidden');
  document.getElementById('step-label').textContent = 'Step 2 of 4';
}

/* ══════════════════════════════════════════════
   STEP 2 → 3  (Activity chosen)
══════════════════════════════════════════════ */
function pickActivity(choice) {
  activity = choice;
  highlightChoice('step2-btns', choice);
  setTimeout(() => {
    document.getElementById('bubble-text').innerHTML =
      "Ooooh sounds perfect! What are we eating after? 🍕";
    document.getElementById('step2-btns').classList.add('hidden');
    document.getElementById('step3-btns').classList.remove('hidden');
    document.getElementById('step-label').textContent = 'Step 3 of 4';
  }, 320);
}

/* ══════════════════════════════════════════════
   STEP 3 → 4  (Food chosen)
══════════════════════════════════════════════ */
function pickFood(choice) {
  food = choice;
  highlightChoice('step3-btns', choice);
  setTimeout(() => {
    document.getElementById('bubble-text').innerHTML =
      "Yum! Last step — pick a day and time that works for you! 🗓️";
    document.getElementById('step3-btns').classList.add('hidden');
    document.getElementById('step4-btns').classList.remove('hidden');
    document.getElementById('step-label').textContent = 'Step 4 of 4';
  }, 320);
}

/* ══════════════════════════════════════════════
   STEP 4 → 5  (Date/time locked)
══════════════════════════════════════════════ */
function lockDate() {
  const input = document.getElementById('dt-input');
  const raw = input.value;
  if (!raw) { input.style.borderColor = '#ef9a9a'; input.focus(); return; }
  input.style.borderColor = '';

  const d = new Date(raw);
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric',
                 hour:'2-digit', minute:'2-digit' };
  chosenDate = d.toLocaleString('en-US', opts);

  // Final confetti
  confetti({ particleCount: 200, spread: 130, origin: { y: 0.6 },
    colors: ['#00bcd4','#b2ebf2','#ffffff','#f48fb1','#80deea'] });

  // Update GIF
  document.getElementById('olaf-img').src =
    'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExZDNvcmY0dzk4OW44NmJnNmJldXJnNTUyajZoc3p4Nnh5dmgxbXRieiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/oPmxYvyUGO6bK/giphy.gif';

  document.getElementById('step4-btns').classList.add('hidden');
  document.getElementById('step-label').textContent = '🎉 It\'s a date!';

  // Build final message
  document.getElementById('bubble-text').innerHTML =
    `It's a date, Rana! 🥂❄️<br/>Here's what we've got planned:`;

  document.getElementById('final-text').innerHTML =
    `<strong>Activity:</strong> ${activity}<br/>
     <strong>Food:</strong> ${food}<br/>
     <strong>When:</strong> ${chosenDate}<br/><br/>
     Can't wait! ☃️💙`;

  document.getElementById('step5-content').classList.remove('hidden');
}

/* ══════════════════════════════════════════════
   HELPER — highlight selected button
══════════════════════════════════════════════ */
function highlightChoice(groupId, choice) {
  const btns = document.querySelectorAll(`#${groupId} .btn-choice`);
  btns.forEach(b => {
    if (b.textContent.trim() === choice) b.classList.add('selected');
  });
}
</script>
</body>
</html>
